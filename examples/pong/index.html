<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pong — KidEngine Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Lobby ─────────────────────────────────────────────── */
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px;
      max-width: 380px;
      width: 100%;
    }

    #lobby h1 {
      font-size: 56px;
      letter-spacing: 8px;
      color: #fff;
    }

    #lobby p {
      color: #888;
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .input-row label {
      font-size: 11px;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    input[type="text"] {
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      letter-spacing: 4px;
      padding: 12px 16px;
      text-align: center;
      text-transform: uppercase;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #fff; }

    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    button {
      background: #fff;
      border: none;
      border-radius: 6px;
      color: #111;
      cursor: pointer;
      flex: 1;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 2px;
      padding: 14px;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover  { background: #ddd; }
    button:active { transform: scale(0.97); }
    button.ghost  { background: transparent; border: 1px solid #444; color: #aaa; }
    button.ghost:hover { border-color: #aaa; color: #fff; }

    #status {
      font-size: 13px;
      color: #888;
      text-align: center;
      min-height: 20px;
    }

    #status.error { color: #ff6b6b; }

    /* big code display after creating a room */
    #room-code {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #room-code span {
      font-size: 11px;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #room-code strong {
      font-size: 52px;
      letter-spacing: 12px;
      color: #fff;
    }

    /* ── Game UI overlay (scores etc.) ─────────────────────── */
    #hud {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 32px;
      justify-content: space-between;
      align-items: center;
      font-size: 32px;
      letter-spacing: 4px;
      pointer-events: none;
      z-index: 10;
    }

    #hud.visible { display: flex; }

    #score-left, #score-right { min-width: 48px; }
    #score-left  { text-align: left; }
    #score-right { text-align: right; }

    #hud-center {
      font-size: 12px;
      color: #555;
      letter-spacing: 2px;
    }

    /* winner banner */
    #winner {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: rgba(0,0,0,0.75);
      z-index: 20;
    }

    #winner.visible { display: flex; }
    #winner h2 { font-size: 40px; letter-spacing: 6px; }
    #winner button { max-width: 200px; }
  </style>
</head>
<body>

  <!-- Lobby screen -->
  <div id="lobby">
    <h1>PONG</h1>
    <p>Create a room and share the code,<br>or join a friend's game.</p>

    <div class="input-row">
      <label>Your name</label>
      <input id="name-input" type="text" maxlength="12"
             placeholder="PLAYER" value="PLAYER" />
    </div>

    <div class="btn-row">
      <button id="btn-create">Create game</button>
    </div>

    <div id="room-code">
      <span>Share this code</span>
      <strong id="code-display"></strong>
      <p style="font-size:12px;color:#555">Waiting for opponent to join…</p>
    </div>

    <div style="width:100%;border-top:1px solid #333;padding-top:24px">
      <div class="input-row">
        <label>Join with code</label>
        <input id="code-input" type="text" maxlength="4" placeholder="ABCD" />
      </div>
      <div class="btn-row" style="margin-top:12px">
        <button id="btn-join" class="ghost">Join game</button>
      </div>
    </div>

    <div id="status"></div>
  </div>

  <!-- Score HUD (shown during game) -->
  <div id="hud">
    <div id="score-left">0</div>
    <div id="hud-center">PONG</div>
    <div id="score-right">0</div>
  </div>

  <!-- Winner banner -->
  <div id="winner">
    <h2 id="winner-text">YOU WIN!</h2>
    <button id="btn-restart">Play again</button>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
