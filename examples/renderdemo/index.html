<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gamekit renderdemo</title>
    <style>
      body {
        margin: 0;
        background: #0c0c10;
        color: #ddd;
        font: 14px monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding-top: 16px;
      }
      #hud { min-height: 1.2em; }
      /* Backing buffer is sized to device pixels in JS (native res); the canvas
         is displayed at this CSS size 1:1, so there's no upscaling shimmer. */
      canvas {
        width: 960px;
        height: 720px;
        background: #14141c;
        border: 1px solid #333;
      }
    </style>
  </head>
  <body>
    <div id="hud">starting…</div>
    <canvas id="view"></canvas>
    <script type="module" src="./main.js"></script>
  </body>
</html>
