<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameKit Stage 7 - Multiplayer Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: monospace;
    }
    #instructions {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 13px;
      z-index: 100;
      color: #fff;
      text-shadow: 2px 2px 4px #000;
      line-height: 1.6;
      max-width: 350px;
    }
    .key {
      display: inline-block;
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #666;
    }
    .highlight {
      color: #4a8;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="instructions">
    <strong>🌐 MULTIPLAYER TEST</strong><br>
    <span class="key">↑</span> <span class="key">↓</span> or <span class="key">W</span> <span class="key">S</span> - Move paddle<br>
    <span class="key">Space</span> - Launch ball<br>
    <span class="key">R</span> - Reset ball<br>
    <br>
    <span class="highlight">SETUP:</span><br>
    1. Start server: <code>node packages/gamekit-server/server.js</code><br>
    2. First player opens this page → creates room<br>
    3. Second player opens <code>?room=CODE</code><br>
    4. Both players see synced paddles!
  </div>

  <script type="module">
    import { Game, GKBox, GKCircle } from '../../packages/gamekit/dist/index.js';

    console.log('=== GameKit Stage 7 Test ===');
    console.log('Testing: Multiplayer network with Socket.io\n');

    // Create game
    const game = new Game({
      width: 800,
      height: 600,
      gravity: 1,
      background: 0x111111,
      server: 'http://localhost:3000'
    });

    // Score tracking
    let hits = 0;
    const updateScore = () => console.log(`💥 Collision! Total hits: ${++hits}`);

    // Floor
    const floor = new GKBox({
      x: 400,
      y: 580,
      width: 800,
      height: 40,
      color: 0x444444,
      isStatic: true
    });
    game.add(floor);

    // Walls
    const leftWall = new GKBox({
      x: 10,
      y: 300,
      width: 20,
      height: 600,
      color: 0x444444,
      isStatic: true
    });
    game.add(leftWall);

    const rightWall = new GKBox({
      x: 790,
      y: 300,
      width: 20,
      height: 600,
      color: 0x444444,
      isStatic: true
    });
    game.add(rightWall);

    // Controllable paddle
    const paddle = new GKBox({
      x: 100,
      y: 300,
      width: 20,
      height: 100,
      color: 0xffffff,
      isStatic: true
    });
    game.add(paddle);

    // Keyboard controls
    const paddleSpeed = 8;
    game.onUpdate(() => {
      if (game.isKeyDown('ArrowUp') || game.isKeyDown('w') || game.isKeyDown('W')) {
        paddle.moveUp(paddleSpeed);
      }
      if (game.isKeyDown('ArrowDown') || game.isKeyDown('s') || game.isKeyDown('S')) {
        paddle.moveDown(paddleSpeed);
      }

      const paddleHalfHeight = 50;
      if (paddle.y < paddleHalfHeight) paddle.y = paddleHalfHeight;
      if (paddle.y > 560 - paddleHalfHeight) paddle.y = 560 - paddleHalfHeight;
    });

    // Ball
    const ball = new GKCircle({
      x: 400,
      y: 100,
      radius: 15,
      color: 0xff0000,
      isStatic: false,
      bounce: 0.9,
      friction: 0.01
    });
    game.add(ball);

    // Collisions
    ball.onCollide(floor, () => {
      console.log('🔴 Ball hit floor!');
      updateScore();
    });
    ball.onCollide(paddle, () => {
      console.log('🏓 Ball hit paddle!');
      updateScore();
    });
    ball.onCollide(leftWall, () => {
      console.log('⬅️  Ball hit left wall!');
      updateScore();
    });
    ball.onCollide(rightWall, () => {
      console.log('➡️  Ball hit right wall!');
      updateScore();
    });

    // Key events
    let ballLaunched = false;
    game.onKey(' ', () => {
      if (!ballLaunched) {
        console.log('🚀 Space - launching ball!');
        ballLaunched = true;
        ball.setVelocity(10, -5);
      }
    });
    game.onKey('r', () => {
      console.log('🔄 R - reset ball');
      ball.x = 400;
      ball.y = 100;
      ball.setVelocity(0, 0);
      ballLaunched = false;
    });
    game.onKey('R', () => {
      console.log('🔄 R - reset ball');
      ball.x = 400;
      ball.y = 100;
      ball.setVelocity(0, 0);
      ballLaunched = false;
    });

    // Mouse click
    game.onTap((x, y) => {
      console.log(`🖱️  Click at (${x}, ${y})`);
      paddle.y = y;
      const paddleHalfHeight = 50;
      if (paddle.y < paddleHalfHeight) paddle.y = paddleHalfHeight;
      if (paddle.y > 560 - paddleHalfHeight) paddle.y = 560 - paddleHalfHeight;
    });

    // === MULTIPLAYER SETUP ===
    const urlParams = new URLSearchParams(window.location.search);
    const roomCodeParam = urlParams.get('room');

    if (roomCodeParam) {
      // Join room
      console.log(`🌐 Joining room: ${roomCodeParam}`);
      const playerName = prompt('Enter your name:', 'Player 2') || 'Player 2';

      game.joinRoom(roomCodeParam, playerName)
        .then(() => {
          console.log('✅ Joined room!');
          game.setOwner(paddle);
          console.log('📡 Paddle synced');
        })
        .catch(err => {
          console.error('❌ Join failed:', err);
          alert('Failed to join. Server running?');
        });
    } else {
      // Create room
      console.log('🌐 Creating room...');
      const playerName = prompt('Enter your name:', 'Player 1') || 'Player 1';

      game.createRoom(playerName)
        .then(({ code }) => {
          console.log(`✅ Room: ${code}`);
          console.log(`🔗 Share: ${window.location.href}?room=${code}`);

          game.setOwner(paddle);
          game.setOwner(ball);

          // Show room code
          const roomDisplay = document.createElement('div');
          roomDisplay.style.cssText = `
            position: fixed;
            top: 120px;
            left: 20px;
            background: #2a6;
            color: #fff;
            padding: 12px 20px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            z-index: 1000;
          `;
          roomDisplay.textContent = `Room: ${code}`;
          document.body.appendChild(roomDisplay);
        })
        .catch(err => {
          console.error('❌ Create failed:', err);
          alert('Failed to create. Server running on :3000?');
        });
    }

    // Player events
    game.onPlayerJoin((player) => {
      console.log(`👋 ${player.name} joined!`);

      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: #4a8;
        color: #fff;
        padding: 12px 20px;
        border-radius: 6px;
        font-family: monospace;
        z-index: 1000;
      `;
      notification.textContent = `${player.name} joined!`;
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 3000);
    });

    game.onPlayerLeave((player) => {
      console.log(`👋 ${player.name} left`);
    });

    // Custom messaging
    let lastScore = 0;
    game.onUpdate(() => {
      if (hits > lastScore) {
        lastScore = hits;
        game.send('scoreUpdate', { hits });
      }
    });

    game.onMessage('scoreUpdate', (data) => {
      console.log(`📨 Score update: ${data.hits}`);
    });

    console.log('\n=== Stage 7 Multiplayer Ready ===');
    console.log('✓ Socket.io network initialized');
    console.log('✓ Room create/join working');
    console.log('✓ Sprite sync at 20Hz');
    console.log('✓ Player events registered');
    console.log('✓ Custom messaging ready');
  </script>
</body>
</html>
