name: Deploy demos to GitHub Pages

# Builds the playable demos and publishes them to GitHub Pages so you can share a
# link. The `mode` demo uses procedural art, so it needs no asset downloads.
#
# Pages serves a project site at https://<user>.github.io/<repo>/, so the demo is
# built with a base path of /<repo>/mode/. Change REPO below if your repo name
# differs, or set it to "" for a user/org or custom-domain site.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  REPO: gamekit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Build the engine
        run: npm run build:gamekit

      - name: Build the mode demo
        run: npx vite build examples/mode-simple --base="/${REPO}/mode/" --outDir "$GITHUB_WORKSPACE/_site/mode"

      - name: Landing page
        run: |
          mkdir -p _site
          cat > _site/index.html <<HTML
          <!doctype html>
          <meta charset="utf-8" />
          <title>gamekit demos</title>
          <style>
            body { font: 16px system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; }
            a { color: #06c; }
          </style>
          <h1>gamekit demos</h1>
          <ul>
            <li><a href="./mode/">Mode</a> — a small arena shooter (WASD + arrows). Needs a WebGPU browser.</li>
          </ul>
          <p>Source: <a href="https://github.com/cjgammon/${REPO}">github.com/cjgammon/${REPO}</a></p>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
