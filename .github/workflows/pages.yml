name: Deploy site + demos to GitHub Pages

# Publishes the interactive tutorial site as the Pages root, with the playable
# demos under /demos/*. Pages serves a project site at
# https://<user>.github.io/<repo>/, so everything is built with that base path.
# Change REPO below if your repo name differs (or set it to "" for a user/org or
# custom-domain site, and drop the base flags).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  REPO: gamekit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Build the tutorial site (Pages root)
        run: SITE_BASE="/${REPO}/" npx vite build site --outDir "$GITHUB_WORKSPACE/_site"

      - name: Build the mode demo
        run: npx vite build examples/mode-simple --base="/${REPO}/demos/mode/" --outDir "$GITHUB_WORKSPACE/_site/demos/mode"

      - name: Build the bunnymark demo
        run: npx vite build examples/bunnymark --base="/${REPO}/demos/bunnymark/" --outDir "$GITHUB_WORKSPACE/_site/demos/bunnymark"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
