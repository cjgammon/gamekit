<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; background: #0e0e14; overflow: hidden; }
      #wrap { position: relative; width: 100%; height: 100%; }
      #view { display: block; width: 100%; height: 100%; }
      /* A simple text overlay the tutorial's hud(text) helper writes to. */
      #hud {
        position: absolute; top: 8px; left: 10px; right: 10px;
        font: 14px system-ui, sans-serif; color: #fff;
        text-shadow: 0 1px 2px #000; pointer-events: none; white-space: pre-line;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="view"></canvas>
      <div id="hud"></div>
    </div>
    <script type="module" src="/src/preview-entry.ts"></script>
  </body>
</html>
